<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AmazingTalker — 拍攝費用明細</title>
<style>
/* ── Design tokens: coral red ── */
:root {
  --coral-50:  #fff5f4;
  --coral-100: #ffe4e1;
  --coral-200: #ffc5be;
  --coral-300: #ff9d92;
  --coral-400: #f87060;
  --coral-500: #ed6a5a;   /* brand main */
  --coral-600: #d95444;
  --coral-700: #b63f30;
  --coral-800: #8c2d20;
  --coral-900: #6b1f14;

  --ink-900: #1a1a1a;
  --ink-700: #3d3d3d;
  --ink-500: #6b6b6b;
  --ink-400: #9e9e9e;
  --ink-300: #c4c4c4;
  --ink-200: #e5e5e5;
  --ink-100: #f5f5f5;
  --ink-50:  #fafafa;
  --white:   #ffffff;

  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;

  --sh-sm: 0 1px 3px rgba(0,0,0,.07);
  --sh-md: 0 4px 14px rgba(0,0,0,.09);
  --sh-lg: 0 10px 30px rgba(0,0,0,.11);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Helvetica Neue", "Microsoft JhengHei", "PingFang TC", sans-serif;
  background: #f6f4f2;
  color: var(--ink-900);
  font-size: 13px;
  min-height: 100vh;
}

/* ═══════════════════════════════════════
   TOP BAR
═══════════════════════════════════════ */
.topbar {
  background: var(--coral-500);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(237,106,90,.3);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .3px;
  margin-right: 24px;
  white-space: nowrap;
}
.brand-dot {
  width: 8px; height: 8px;
  background: rgba(255,255,255,.5);
  border-radius: 50%;
}

/* doc switcher */
.doc-switcher {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
  padding: 6px 0;
  scrollbar-width: none;
}
.doc-switcher::-webkit-scrollbar { display: none; }
.doc-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.85);
  border-radius: 20px;
  font: inherit;
  font-size: 12.5px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .14s;
  flex-shrink: 0;
}
.doc-tab:hover { background: rgba(255,255,255,.28); color: #fff; }
.doc-tab.active {
  background: #fff;
  color: var(--coral-600);
  font-weight: 600;
  border-color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
.doc-tab-close {
  width: 16px; height: 16px;
  border: none; background: none;
  color: inherit; font-size: 14px;
  cursor: pointer; line-height: 1;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: .6;
  transition: opacity .12s, background .12s;
  padding: 0;
}
.doc-tab-close:hover { opacity: 1; background: rgba(0,0,0,.12); }
.btn-new-doc {
  padding: 5px 12px;
  background: rgba(255,255,255,.22);
  border: 1px dashed rgba(255,255,255,.5);
  color: rgba(255,255,255,.9);
  border-radius: 20px;
  font: inherit;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all .14s;
}
.btn-new-doc:hover { background: rgba(255,255,255,.32); border-style: solid; }

.topbar-actions {
  display: flex;
  gap: 8px;
  margin-left: 16px;
  flex-shrink: 0;
}
.tbtn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px;
  border-radius: var(--r-md);
  font: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all .13s;
  border: none;
  white-space: nowrap;
}
.tbtn-ghost {
  background: rgba(255,255,255,.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,.3);
}
.tbtn-ghost:hover { background: rgba(255,255,255,.32); }
.tbtn-white {
  background: #fff;
  color: var(--coral-600);
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.tbtn-white:hover { box-shadow: 0 2px 8px rgba(0,0,0,.16); transform: translateY(-1px); }
.tbtn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ═══════════════════════════════════════
   PAGE NAV (tabs under topbar)
═══════════════════════════════════════ */
.pagenav {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--ink-200);
  background: var(--white);
}
.pagenav-btn {
  padding: 12px 20px;
  border: none;
  background: none;
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-500);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .14s;
  white-space: nowrap;
}
.pagenav-btn:hover { color: var(--ink-700); }
.pagenav-btn.active { color: var(--coral-600); border-bottom-color: var(--coral-500); font-weight: 600; }

/* ═══════════════════════════════════════
   MAIN
═══════════════════════════════════════ */
.main { max-width: 1040px; margin: 0 auto; padding: 24px 20px 60px; }

.page { display: none; }
.page.active { display: block; }

/* ═══════════════════════════════════════
   SHEET (white card)
═══════════════════════════════════════ */
.sheet {
  background: var(--white);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-lg);
  overflow: hidden;
  border: 1px solid var(--ink-200);
}

/* ─── Doc header ─── */
.doc-header {
  background: linear-gradient(135deg, var(--coral-500) 0%, var(--coral-600) 100%);
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.doc-title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .3px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.month-inp {
  border: none;
  background: rgba(255,255,255,.2);
  color: #fff;
  font: inherit;
  font-size: 20px;
  font-weight: 700;
  width: 52px;
  text-align: center;
  border-radius: 6px;
  outline: none;
  padding: 0 4px;
}
.month-inp:focus { background: rgba(255,255,255,.3); }
.doc-date-group {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 3px;
}
.doc-date-group label {
  font-size: 9.5px;
  letter-spacing: 2px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
}
.doc-date-inp {
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.15);
  color: #fff;
  font: inherit;
  font-size: 13px;
  border-radius: 6px;
  padding: 5px 10px;
  outline: none;
}
.doc-date-inp:focus { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }
.doc-date-inp::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.7); cursor: pointer; }

/* ─── Info cards ─── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 20px 28px;
  background: var(--coral-50);
  border-bottom: 1px solid var(--coral-100);
}
.info-card {
  background: var(--white);
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1px solid var(--ink-200);
  box-shadow: var(--sh-sm);
}
.info-card-label {
  padding: 7px 12px;
  font-size: 9px;
  letter-spacing: 2.5px;
  font-weight: 700;
  text-transform: uppercase;
}
.info-card.mailing .info-card-label { background: var(--coral-500); color: #fff; }
.info-card.bill-to .info-card-label { background: var(--ink-700); color: #fff; }
.info-card-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 2px; }
.info-card-body input {
  border: none; background: transparent; font: inherit;
  font-size: 12.5px; color: var(--ink-700); outline: none;
  padding: 2px 4px; border-radius: 3px;
}
.info-card-body input:focus { background: var(--coral-50); }

/* ─── Page body ─── */
.page-body { padding: 24px 28px 32px; }

/* ─── Shoot blocks ─── */
.shoot {
  border: 1px solid var(--ink-200);
  border-radius: var(--r-md);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--sh-sm);
  transition: box-shadow .18s;
}
.shoot:hover { box-shadow: var(--sh-md); }

.shoot-head {
  background: linear-gradient(90deg, var(--coral-50), #fff9f8);
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--coral-100);
}
.shoot-num {
  width: 22px; height: 22px;
  background: var(--coral-500);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700;
  flex-shrink: 0;
}
.shoot-title-inp {
  border: none; background: transparent; font: inherit;
  font-size: 13.5px; font-weight: 600;
  color: var(--coral-700); outline: none; flex: 1;
}
.shoot-title-inp::placeholder { color: var(--coral-300); font-weight: 400; }
.shoot-title-inp:focus { background: rgba(255,255,255,.7); border-radius: 4px; padding: 0 6px; }

.shoot-actions { display: flex; gap: 5px; }
.btn-xs {
  padding: 4px 10px; border-radius: var(--r-sm);
  font: inherit; font-size: 11px; cursor: pointer; transition: all .12s;
}
.btn-xs-ghost {
  border: 1px solid var(--coral-300);
  background: rgba(255,255,255,.7);
  color: var(--coral-700);
}
.btn-xs-ghost:hover { background: var(--white); border-color: var(--coral-400); }
.btn-xs-del {
  border: 1px solid #fca5a5;
  background: #fff5f5;
  color: #dc2626;
}
.btn-xs-del:hover { background: #fee2e2; }

/* ─── Table ─── */
.shoot table, .gear-table, .bank-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }

.shoot thead th {
  background: var(--ink-50);
  padding: 7px 12px;
  text-align: left;
  font-weight: 600; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--ink-500);
  border-bottom: 1px solid var(--ink-200);
}
.shoot thead th.r { text-align: right; }
.shoot thead th.c { text-align: center; }

.shoot tbody td {
  padding: 7px 12px;
  border-bottom: 1px solid #fafafa;
  color: var(--ink-700);
}
.shoot tbody tr:last-child td { border-bottom: none; }
.shoot tbody td.r { text-align: right; }
.shoot tbody td.c { text-align: center; }

.shoot tbody td input {
  width: 100%; border: none; background: transparent;
  font: inherit; font-size: 12.5px; color: var(--ink-700);
  outline: none; padding: 2px 4px; border-radius: 3px;
}
.shoot tbody td input:focus { background: var(--coral-50); }
.shoot tbody td.r input { text-align: right; }
.shoot tbody td.c input { text-align: center; }

.shoot tbody tr.gear-row td { background: #fff9f8; }
.shoot tbody tr.gear-row .gear-label { color: var(--coral-600); font-style: italic; }
.shoot tbody tr.gear-row .gear-amount { color: var(--coral-600); font-weight: 600; }

.amount-cell { font-variant-numeric: tabular-nums; font-weight: 500; }
.amount-accent { color: var(--coral-600); font-weight: 600; }

.shoot tfoot tr td {
  background: var(--ink-50);
  border-top: 2px solid var(--ink-200);
  padding: 8px 12px;
  font-weight: 700;
}
.shoot tfoot .shoot-sub {
  text-align: right;
  color: var(--coral-600);
  font-size: 13.5px;
}

/* ─── Add shoot btn ─── */
.add-shoot-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px;
  margin-bottom: 22px;
  border: 1.5px dashed var(--coral-300);
  background: var(--coral-50);
  color: var(--coral-600);
  font: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; border-radius: var(--r-md);
  transition: all .14s;
}
.add-shoot-btn:hover { border-style: solid; background: var(--coral-100); }

/* ─── Grand total ─── */
.grand-total {
  background: linear-gradient(135deg, var(--coral-500), var(--coral-700));
  border-radius: var(--r-md);
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 16px rgba(237,106,90,.3);
}
.grand-total-label { color: rgba(255,255,255,.75); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
.grand-total-value { font-size: 24px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }

/* ═══════════════════════════════════════
   GEAR PAGE
═══════════════════════════════════════ */
.gear-page-head {
  padding: 20px 28px 0;
  background: var(--ink-50);
  border-bottom: 1px solid var(--ink-200);
}
.gear-page-title { font-size: 14px; font-weight: 700; color: var(--ink-700); margin-bottom: 12px; }
.gear-tabs-bar { display: flex; gap: 3px; flex-wrap: wrap; }
.gear-tabs-bar button {
  padding: 7px 15px;
  border: 1px solid var(--ink-200); border-bottom: none;
  background: var(--ink-100); color: var(--ink-500);
  font: inherit; font-size: 12px; cursor: pointer;
  border-radius: 6px 6px 0 0; transition: all .12s; font-weight: 500;
}
.gear-tabs-bar button:hover { background: var(--white); color: var(--ink-700); }
.gear-tabs-bar button.active {
  background: var(--white); color: var(--coral-600);
  border-color: var(--ink-200); font-weight: 700;
  position: relative;
}
.gear-tabs-bar button.active::after {
  content:''; position: absolute;
  bottom: -1px; left: 0; right: 0; height: 1px; background: var(--white);
}
.gear-tabs-bar .empty-msg { color: var(--ink-400); font-size: 12px; padding: 8px 4px; }

.gear-content { padding: 24px 28px 32px; }
.gear-sheet { display: none; }
.gear-sheet.active { display: block; }

.gear-sheet-head {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 16px;
  margin-bottom: 18px; padding-bottom: 14px;
  border-bottom: 2px solid var(--coral-100);
}
.gear-sheet-title { font-size: 16px; font-weight: 700; color: var(--coral-700); }
.gear-sheet-sub { font-size: 11.5px; color: var(--ink-400); margin-top: 3px; }
.gear-preset-btns { display: flex; gap: 5px; flex-wrap: wrap; }
.gear-preset-btns button {
  padding: 5px 11px;
  border: 1px solid var(--coral-300); background: var(--white); color: var(--coral-600);
  font: inherit; font-size: 11.5px; border-radius: var(--r-sm); cursor: pointer;
  transition: all .12s; font-weight: 500;
}
.gear-preset-btns button:hover { background: var(--coral-50); border-color: var(--coral-400); }
.gear-preset-btns button.add-row { border-color: var(--ink-300); color: var(--ink-500); background: var(--ink-50); }
.gear-preset-btns button.add-row:hover { background: var(--ink-100); }

.gear-table thead th {
  background: var(--ink-50); padding: 7px 10px;
  text-align: left; font-weight: 600; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--ink-500);
  border-bottom: 1px solid var(--ink-200);
}
.gear-table thead th.r { text-align: right; }
.gear-table thead th.c { text-align: center; }
.gear-table tbody td {
  padding: 7px 10px;
  border-bottom: 1px dashed var(--ink-100);
  color: var(--ink-700);
}
.gear-table tbody tr:last-child td { border-bottom: none; }
.gear-table tbody td.r { text-align: right; }
.gear-table tbody td.c { text-align: center; }
.gear-table td.seq { color: var(--ink-400); font-size: 11px; text-align: center; width: 38px; }
.gear-table td input {
  width: 100%; border: none; background: transparent;
  font: inherit; font-size: 12.5px; color: var(--ink-700);
  outline: none; padding: 2px 4px; border-radius: 3px;
}
.gear-table td.r input { text-align: right; }
.gear-table td.c input { text-align: center; }
.gear-table td input:focus { background: var(--coral-50); }
.gear-table tfoot td {
  padding: 9px 10px; font-weight: 700;
  background: var(--coral-50); border-top: 2px solid var(--coral-200);
  text-align: right; color: var(--coral-700); font-size: 13px;
}
.gear-table tfoot td:first-child { text-align: center; font-size: 10px; letter-spacing: 1px; color: var(--coral-500); }

/* ═══════════════════════════════════════
   BANK PAGE
═══════════════════════════════════════ */
.bank-section {
  background: var(--white);
  border-radius: var(--r-xl);
  box-shadow: var(--sh-lg);
  overflow: hidden;
  border: 1px solid var(--ink-200);
}
.bank-section-header {
  background: linear-gradient(135deg, var(--ink-700), var(--ink-900));
  padding: 16px 24px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .3px;
}
.bank-section-header span { font-size: 11px; opacity: .6; font-weight: 400; margin-left: 8px; letter-spacing: 1px; }

.bank-table { }
.bank-table thead th {
  background: var(--ink-50); padding: 8px 12px;
  text-align: left; font-weight: 600; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--ink-500);
  border-bottom: 1px solid var(--ink-200);
}
.bank-table thead th.r { text-align: right; }
.bank-table thead th.c { text-align: center; }
.bank-table tbody td {
  padding: 8px 12px; border-bottom: 1px solid var(--ink-100);
  color: var(--ink-700);
}
.bank-table tbody tr:last-child td { border-bottom: none; }
.bank-table tbody td.r { text-align: right; }
.bank-table tbody td.c { text-align: center; }
.bank-table tbody td input {
  width: 100%; border: none; background: transparent;
  font: inherit; font-size: 12.5px; color: var(--ink-700);
  outline: none; padding: 2px 4px; border-radius: 3px;
}
.bank-table tbody td input:focus { background: var(--coral-50); }
.bank-table tbody td.r input { text-align: right; }
.bank-table tbody td.c input { text-align: center; }
.bank-table tbody td.seq { color: var(--ink-400); font-size: 11px; width: 36px; text-align: center; }
.bank-table tfoot td {
  background: var(--ink-50); padding: 10px 12px;
  border-top: 2px solid var(--ink-200); font-weight: 700;
  text-align: right; color: var(--ink-700); font-size: 13.5px;
}
.bank-table tfoot td:first-child { text-align: left; letter-spacing: 2px; font-size: 11px; color: var(--ink-500); }

.bank-add-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 16px;
  border: none; border-top: 1px solid var(--ink-200);
  background: var(--ink-50); color: var(--ink-500);
  font: inherit; font-size: 12px; cursor: pointer;
  width: 100%; text-align: left; transition: all .13s;
}
.bank-add-btn:hover { background: var(--ink-100); color: var(--ink-700); }

/* ─── Shared delete btn ─── */
button.row-del {
  border: none; background: none;
  color: #fca5a5; cursor: pointer; font-size: 16px;
  line-height: 1; padding: 0 2px;
  transition: color .1s;
}
button.row-del:hover { color: #dc2626; }

/* ═══════════════════════════════════════
   DOC MANAGER MODAL
═══════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--r-xl);
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  width: 440px;
  max-width: 92vw;
  overflow: hidden;
}
.modal-head {
  background: var(--coral-500);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h2 { font-size: 15px; font-weight: 700; color: #fff; }
.modal-head-close {
  width: 28px; height: 28px;
  border: none; background: rgba(255,255,255,.2);
  color: #fff; font-size: 18px;
  border-radius: 50%; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.modal-head-close:hover { background: rgba(255,255,255,.32); }
.modal-body { padding: 20px; }
.modal-doc-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 320px; overflow-y: auto; }
.modal-doc-item {
  display: flex; align-items: center;
  padding: 10px 14px;
  border: 1px solid var(--ink-200);
  border-radius: var(--r-md);
  cursor: pointer; transition: all .13s; gap: 10px;
}
.modal-doc-item:hover { border-color: var(--coral-300); background: var(--coral-50); }
.modal-doc-item.active { border-color: var(--coral-400); background: var(--coral-50); }
.modal-doc-item-info { flex: 1; }
.modal-doc-item-name { font-weight: 600; font-size: 13px; color: var(--ink-700); }
.modal-doc-item-meta { font-size: 11px; color: var(--ink-400); margin-top: 2px; }
.modal-doc-item-del {
  border: none; background: none;
  color: var(--ink-300); cursor: pointer; font-size: 16px;
  padding: 2px 6px; border-radius: var(--r-sm);
}
.modal-doc-item-del:hover { color: #dc2626; background: #fee2e2; }
.modal-new-row {
  display: flex; gap: 8px;
  padding-top: 14px;
  border-top: 1px solid var(--ink-200);
}
.modal-new-inp {
  flex: 1; border: 1px solid var(--ink-200);
  border-radius: var(--r-md); padding: 8px 12px;
  font: inherit; font-size: 13px; outline: none;
}
.modal-new-inp:focus { border-color: var(--coral-400); }
.modal-new-btn {
  padding: 8px 16px;
  background: var(--coral-500); color: #fff;
  border: none; border-radius: var(--r-md);
  font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .13s;
}
.modal-new-btn:hover { background: var(--coral-600); }

/* ═══════════════════════════════════════
   PRINT
═══════════════════════════════════════ */
@media print {
  body { background: #fff; }
  .topbar, .pagenav { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .sheet { box-shadow: none; border-radius: 0; border: none; }
  /* 所有 page 區塊都顯示，各自分頁 */
  .page { display: block !important; page-break-after: always; }
  .page:last-child { page-break-after: auto; }
  /* bank-section 沒有 .sheet 包覆，補上列印樣式 */
  .bank-section { box-shadow: none; border-radius: 0; }
  /* 隱藏操作按鈕 */
  .add-shoot-btn, .shoot-actions, .btn-xs, button.row-del,
  .gear-preset-btns, .gear-tabs-bar, .bank-add-btn { display: none !important; }
  input { border: none !important; background: transparent !important; }
  /* 器材單：全部展開，不依賴 active tab */
  .gear-sheet { display: block !important; page-break-inside: avoid; margin-bottom: 24px; }
  /* 器材頁整體不需要再 page-break，已被 .page 控制 */
  @page { size: A4 portrait; margin: 12mm; }
}

/* ════════════════════════════════════════
   MULTI-DOC STORAGE  (localStorage)
════════════════════════════════════════ */
const STORAGE_KEY = 'at_quotation_docs';
let DOCS      = {};   // { id: { name, data } }
let activeDoc = null; // id string

function loadAllDocs() {
  try { DOCS = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { DOCS = {}; }
  // 確保至少有一筆預設（不透過 saveAllDocs，避免 activeDoc 未設定時讀空 DOM）
  if (Object.keys(DOCS).length === 0) {
    const id = genId();
    const now = new Date();
    const defaultName = `${now.getFullYear()}年${now.getMonth()+1}月`;
    DOCS[id] = { name: defaultName, data: defaultDocData() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS));
  }
  activeDoc = Object.keys(DOCS)[0];
}
function saveAllDocs() {
  // 先把目前表單狀態收回 DOCS（activeDoc 已設定才做）
  if (activeDoc && DOCS[activeDoc]) DOCS[activeDoc].data = collectCurrentDoc();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS));
}
function genId() { return 'doc_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

/* ── Default doc data ── */

/* ── Collect current UI → data obj ── */
function collectCurrentDoc() {
  const banks = [];
  document.querySelectorAll('#bankBody tr').forEach(tr => {
    const i = tr.querySelectorAll('input');
    banks.push({ name:i[0].value, amount:parseFloat(i[1].value)||0, bank:i[2].value, code:i[3].value, acct:i[4].value });
  });
  return {
    month:   document.getElementById('month').value,
    docDate: document.getElementById('docDate').value,
    mailing: { company:m_company.value, addr1:m_addr1.value, addr2:m_addr2.value, phone:m_phone.value },
    billTo:  { name:b_name.value, addr1:b_addr1.value, addr2:b_addr2.value, phone:b_phone.value },
    shoots:  STATE.shoots.map(s => ({ title:s.title, items:s.items, gear:s.gear })),
    banks
  };
}

/* ── Apply data obj → UI ── */
function applyDoc(d) {
  document.getElementById('month').value   = d.month   || new Date().getMonth()+1;
  document.getElementById('docDate').value = d.docDate || '';
  m_company.value = d.mailing?.company || '';
  m_addr1.value   = d.mailing?.addr1   || '';
  m_addr2.value   = d.mailing?.addr2   || '';
  m_phone.value   = d.mailing?.phone   || '';
  b_name.value    = d.billTo?.name  || '';
  b_addr1.value   = d.billTo?.addr1 || '';
  b_addr2.value   = d.billTo?.addr2 || '';
  b_phone.value   = d.billTo?.phone || '';
  shootSeq = 0;
  STATE.shoots = (d.shoots||[]).map(s => newShoot(s));

  document.getElementById('bankBody').innerHTML = '';
  (d.banks||[]).forEach(addBankRow);

  renderAll();
}

/* ── Switch to doc ── */
function switchDoc(id) {
  if (activeDoc === id) { closeDocManager(); return; }
  // save current before switching
  if (activeDoc && DOCS[activeDoc]) DOCS[activeDoc].data = collectCurrentDoc();
  activeDoc = id;
  applyDoc(DOCS[id].data);
  renderDocSwitcher();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS)); // direct save, no collect loop
  closeDocManager();
}

/* ── Create new doc ── */
function createDoc() {
  const name = document.getElementById('newDocName').value.trim();
  if (!name) { document.getElementById('newDocName').focus(); return; }
  // save current doc first
  if (activeDoc && DOCS[activeDoc]) DOCS[activeDoc].data = collectCurrentDoc();
  const id = genId();
  DOCS[id] = { name, data: defaultDocData() };
  activeDoc = id;
  applyDoc(DOCS[id].data);
  renderDocSwitcher();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS));
  document.getElementById('newDocName').value = '';
  closeDocManager();
}

/* ── Delete doc ── */
function deleteDoc(id) {
  if (Object.keys(DOCS).length <= 1) { alert('至少要保留一筆單據'); return; }
  if (!confirm(`確定刪除「${DOCS[id].name}」？`)) return;
  // save current (non-deleted) doc before mutating
  if (activeDoc && activeDoc !== id && DOCS[activeDoc]) DOCS[activeDoc].data = collectCurrentDoc();
  delete DOCS[id];
  if (activeDoc === id) {
    activeDoc = Object.keys(DOCS)[0];
    applyDoc(DOCS[activeDoc].data);
  }
  renderDocSwitcher();
  renderModalDocList();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS));
}

/* ── Rename (not exposed in UI yet, kept for future use) ── */
function renameDoc(id, newName) {
  if (!newName.trim()) return;
  DOCS[id].name = newName.trim();
  renderDocSwitcher();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DOCS));
}

/* ── Render top switcher ── */
function renderDocSwitcher() {
  const sw = document.getElementById('docSwitcher');
  sw.innerHTML = '';
  Object.entries(DOCS).forEach(([id, doc]) => {
    const tab = document.createElement('button');
    tab.className = 'doc-tab' + (id === activeDoc ? ' active' : '');
    tab.innerHTML = `<span>${escH(doc.name)}</span>`;
    tab.onclick = () => switchDoc(id);
    sw.appendChild(tab);
  });
}

/* ── Modal ── */
function openDocManager() {
  renderModalDocList();
  document.getElementById('docModal').classList.add('open');
}
function closeDocManager() {
  document.getElementById('docModal').classList.remove('open');
}
document.getElementById('docModal').addEventListener('click', e => {
  if (e.target === document.getElementById('docModal')) closeDocManager();
});

function renderModalDocList() {
  const list = document.getElementById('modalDocList');
  list.innerHTML = '';
  if (Object.keys(DOCS).length === 0) {
    list.innerHTML = '<div style="color:#9e9e9e;text-align:center;padding:16px">尚無單據</div>';
    return;
  }
  Object.entries(DOCS).forEach(([id, doc]) => {
    const item = document.createElement('div');
    item.className = 'modal-doc-item' + (id === activeDoc ? ' active' : '');

    // count shoots
    const shootCount = (doc.data.shoots||[]).length;
    const dateStr = doc.data.docDate || '—';

    item.innerHTML = `
      <div class="modal-doc-item-info">
        <div class="modal-doc-item-name">${escH(doc.name)}</div>
        <div class="modal-doc-item-meta">${shootCount} 個拍攝日　·　${dateStr}</div>
      </div>
      <button class="modal-doc-item-del" title="刪除">🗑</button>
    `;
    item.querySelector('.modal-doc-item-info').onclick = () => switchDoc(id);
    item.querySelector('.modal-doc-item-del').onclick = e => { e.stopPropagation(); deleteDoc(id); };
    list.appendChild(item);
  });
}

/* ════════════════════════════════════════
   STATE & SHOOT MODEL
════════════════════════════════════════ */
let shootSeq = 0;
const STATE = { shoots: [] };

function newShoot(data) {
  data = data || {};
  shootSeq++;
  return {
    id: shootSeq,
    title: data.title || '',
    items: data.items || [
      { item:'攝影師',     unit:'班', qty:1, price:5000 },
      { item:'攝影助理',   unit:'班', qty:1, price:3000 },
      { item:'驚奇說拍攝', unit:'集', qty:1, price:300  }
    ],
    gear: data.gear || JSON.parse(JSON.stringify(GEAR_PRESETS.full))
  };
}
function addShoot(data) { STATE.shoots.push(newShoot(data)); renderAll(); autoSave(); }
function removeShoot(id) { STATE.shoots = STATE.shoots.filter(s => s.id !== id); renderAll(); autoSave(); }

/* ════════════════════════════════════════
   CALC
════════════════════════════════════════ */
function gearTotal(gear)  { return gear.reduce((s,g) => s + (g.qty||0)*(g.price||0)*((g.pct||0)/100), 0); }
function shootSubtotal(s) { return s.items.reduce((t,it) => t+(it.qty||0)*(it.price||0), 0) + gearTotal(s.gear); }
function grandTotal()     { return STATE.shoots.reduce((t,s) => t + shootSubtotal(s), 0); }

/* ════════════════════════════════════════
   RENDER PAGE 1
════════════════════════════════════════ */
function renderShoots() {
  const list = document.getElementById('shootList');
  list.innerHTML = '';
  STATE.shoots.forEach((shoot, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'shoot';
    wrap.innerHTML = `
      <div class="shoot-head">
        <div class="shoot-num">${idx+1}</div>
        <input type="text" class="shoot-title-inp" placeholder="例：1128 EKO 驚奇說" value="${escA(shoot.title)}">
        <div class="shoot-actions">
          <button class="btn-xs btn-xs-ghost gear-jump-btn">器材單 →</button>
          <button class="btn-xs btn-xs-del del-shoot-btn">刪除</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:38%">項目</th>
            <th class="c" style="width:58px">單位</th>
            <th class="c" style="width:62px">數量</th>
            <th class="r" style="width:88px">單價</th>
            <th class="r" style="width:96px">金額</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="4" style="text-align:right;color:#9e9e9e;font-size:10px;letter-spacing:2px;font-weight:600;">小　計</td>
            <td class="shoot-sub"></td>
          </tr>
        </tfoot>
      </table>
    `;
    const tbody = wrap.querySelector('tbody');
    shoot.items.forEach((it,i) => tbody.appendChild(itemRow(shoot, i, it)));

    // gear auto-row
    const gAmt = gearTotal(shoot.gear);
    const gtr = document.createElement('tr');
    gtr.className = 'gear-row';
    gtr.innerHTML = `
      <td><span class="gear-label">器材費（來自器材單）</span></td>
      <td class="c" style="color:#c4c4c4;font-size:11px">式</td>
      <td class="c" style="color:#c4c4c4;font-size:11px">1</td>
      <td class="r" style="color:#c4c4c4;font-size:11px">${Math.round(gAmt).toLocaleString()}</td>
      <td class="r gear-amount amount-cell">${fmtDec(gAmt)}</td>
    `;
    tbody.appendChild(gtr);
    wrap.querySelector('.shoot-sub').textContent = fmtDec(shootSubtotal(shoot));

    wrap.querySelector('.shoot-title-inp').addEventListener('input', e => {
      shoot.title = e.target.value; renderGearTabs(); renderGearSheets(); autoSave();
    });
    wrap.querySelector('.del-shoot-btn').addEventListener('click', () => {
      if (confirm('確定刪除此拍攝日（連同其器材單）？')) removeShoot(shoot.id);
    });
    wrap.querySelector('.gear-jump-btn').addEventListener('click', () => switchToGearPage(shoot.id));

    list.appendChild(wrap);
  });
  document.getElementById('grandTotal').textContent = fmt$(grandTotal());
}

function itemRow(shoot, idx, it) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" value="${escA(it.item)}" placeholder="項目名稱"></td>
    <td class="c"><input type="text" value="${escA(it.unit)}" style="width:50px;text-align:center"></td>
    <td class="c"><input type="number" value="${it.qty}" step="0.5" min="0" style="width:54px;text-align:center"></td>
    <td class="r"><input type="number" value="${it.price}" step="100" min="0" style="text-align:right"></td>
    <td class="r amount-cell amount-accent row-amount">${fmtDec((it.qty||0)*(it.price||0))}</td>
  `;
  const inp = tr.querySelectorAll('input');
  inp[0].addEventListener('input', e => { it.item = e.target.value; autoSave(); });
  inp[1].addEventListener('input', e => { it.unit = e.target.value; autoSave(); });
  inp[2].addEventListener('input', e => { it.qty = parseFloat(e.target.value)||0; updateShootRow(tr,it,shoot); });
  inp[3].addEventListener('input', e => { it.price = parseFloat(e.target.value)||0; updateShootRow(tr,it,shoot); });
  return tr;
}
function updateShootRow(tr, it, shoot) {
  tr.querySelector('.row-amount').textContent = fmtDec((it.qty||0)*(it.price||0));
  tr.closest('.shoot').querySelector('.shoot-sub').textContent = fmtDec(shootSubtotal(shoot));
  document.getElementById('grandTotal').textContent = fmt$(grandTotal());
  autoSave();
}

/* ════════════════════════════════════════
   RENDER PAGE 2 (gear)
════════════════════════════════════════ */
let activeGearId = null;

function switchToGearPage(shootId) {
  document.querySelectorAll('.pagenav-btn').forEach(b => b.classList.toggle('active', b.dataset.page==='page-gear'));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.classList.contains('page-gear')));
  activeGearId = shootId;
  renderGearTabs(); renderGearSheets();
}

function renderGearTabs() {
  const tabs = document.getElementById('gearTabs');
  tabs.innerHTML = '';
  if (STATE.shoots.length === 0) {
    tabs.innerHTML = '<div class="empty-msg">尚未新增拍攝日</div>'; return;
  }
  if (!STATE.shoots.find(s => s.id === activeGearId)) activeGearId = STATE.shoots[0].id;
  STATE.shoots.forEach(s => {
    const b = document.createElement('button');
    b.textContent = s.title || '(未命名)';
    if (s.id === activeGearId) b.classList.add('active');
    b.onclick = () => { activeGearId = s.id; renderGearTabs(); renderGearSheets(); };
    tabs.appendChild(b);
  });
}

function renderGearSheets() {
  const wrap = document.getElementById('gearSheets');
  wrap.innerHTML = '';
  STATE.shoots.forEach(shoot => {
    const sheet = document.createElement('div');
    sheet.className = 'gear-sheet' + (shoot.id === activeGearId ? ' active' : '');
    sheet.innerHTML = `
      <div class="gear-sheet-head">
        <div>
          <div class="gear-sheet-title">AmazingTalker 節目拍攝器材單</div>
          <div class="gear-sheet-sub">${escH(shoot.title||'(未命名)')}</div>
        </div>
        <div class="gear-preset-btns">
          <button data-act="full">套用完整器材組</button>
          <button data-act="light">套用簡易燈光組</button>
          <button data-act="add" class="add-row">＋ 新增空白列</button>
        </div>
      </div>
      <table class="gear-table">
        <thead>
          <tr>
            <th class="c" style="width:40px">#</th>
            <th>描述</th>
            <th class="c" style="width:58px">數量</th>
            <th class="r" style="width:80px">單價</th>
            <th class="c" style="width:70px">收費 %</th>
            <th class="r" style="width:92px">金額</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="5">合　計</td>
            <td class="gear-total">${fmtDec(gearTotal(shoot.gear))}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    `;
    const tbody = sheet.querySelector('tbody');
    shoot.gear.forEach((g,i) => tbody.appendChild(gearRow(shoot, i, g, sheet)));

    sheet.querySelectorAll('.gear-preset-btns button').forEach(btn => {
      btn.addEventListener('click', () => {
        const a = btn.dataset.act;
        if (a==='full')  { if (!confirm('套用完整器材組（覆蓋目前）？')) return; shoot.gear = JSON.parse(JSON.stringify(GEAR_PRESETS.full)); }
        else if (a==='light') { if (!confirm('套用簡易燈光組（覆蓋目前）？')) return; shoot.gear = JSON.parse(JSON.stringify(GEAR_PRESETS.light)); }
        else shoot.gear.push({ desc:'', qty:1, price:0, pct:50 });
        renderGearSheets(); renderShoots(); autoSave();
      });
    });
    wrap.appendChild(sheet);
  });
}

function gearRow(shoot, idx, g, sheet) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="seq">${idx+1}</td>
    <td><input type="text" value="${escA(g.desc)}" placeholder="器材描述"></td>
    <td class="c"><input type="number" value="${g.qty}" step="1" min="0" style="width:50px;text-align:center"></td>
    <td class="r"><input type="number" value="${g.price}" step="50" min="0" style="text-align:right"></td>
    <td class="c"><input type="number" value="${g.pct}" step="10" min="0" max="100" style="width:54px;text-align:center"></td>
    <td class="r row-gear-amt amount-cell">${fmtDec((g.qty||0)*(g.price||0)*((g.pct||0)/100))}</td>
    <td><button class="row-del">×</button></td>
  `;
  const inps = tr.querySelectorAll('input');
  const onChange = () => {
    g.desc  = inps[0].value;
    g.qty   = parseFloat(inps[1].value)||0;
    g.price = parseFloat(inps[2].value)||0;
    g.pct   = parseFloat(inps[3].value)||0;
    tr.querySelector('.row-gear-amt').textContent = fmtDec(g.qty*g.price*(g.pct/100));
    sheet.querySelector('.gear-total').textContent = fmtDec(gearTotal(shoot.gear));
    renderShoots(); autoSave();
  };
  inps.forEach(i => i.addEventListener('input', onChange));
  tr.querySelector('.row-del').addEventListener('click', () => {
    shoot.gear.splice(idx, 1); renderGearSheets(); renderShoots(); autoSave();
  });
  return tr;
}

/* ════════════════════════════════════════
   RENDER PAGE 3 (bank)
════════════════════════════════════════ */
function addBankRow(d) {
  d = d || {};
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="seq"></td>
    <td><input type="text" value="${escA(d.name||'')}" placeholder="姓名"></td>
    <td class="r"><input type="number" value="${d.amount||0}" step="100" style="text-align:right"></td>
    <td><input type="text" value="${escA(d.bank||'')}" placeholder="銀行名稱"></td>
    <td class="c"><input type="text" value="${escA(d.code||'')}" style="text-align:center"></td>
    <td><input type="text" value="${escA(d.acct||'')}" placeholder="帳號"></td>
    <td><button class="row-del">×</button></td>
  `;
  document.getElementById('bankBody').appendChild(tr);
  tr.querySelectorAll('input').forEach(i => i.addEventListener('input', () => { recalcBank(); autoSave(); }));
  tr.querySelector('.row-del').addEventListener('click', () => { tr.remove(); recalcBank(); autoSave(); });
  recalcBank();
}
function recalcBank() {
  let total = 0;
  document.querySelectorAll('#bankBody tr').forEach((tr, i) => {
    tr.querySelector('.seq').textContent = i+1;
    total += parseFloat(tr.querySelectorAll('input')[1].value)||0;
  });
  document.getElementById('bankTotal').textContent = fmt$(total);
}

/* ════════════════════════════════════════
   AUTO-SAVE (debounced)
════════════════════════════════════════ */
let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveAllDocs(); }, 800);
}

// also save on info-field changes
['m_company','m_addr1','m_addr2','m_phone','b_name','b_addr1','b_addr2','b_phone','month','docDate']
  .forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', autoSave);
  });

/* ════════════════════════════════════════
   RENDER ALL
════════════════════════════════════════ */
function renderAll() { renderShoots(); renderGearTabs(); renderGearSheets(); }

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
function init() {
  loadAllDocs();
  applyDoc(DOCS[activeDoc].data);
  renderDocSwitcher();
}
init();
</script>
</body>
</html>
